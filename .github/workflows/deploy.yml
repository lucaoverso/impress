name: Deploy no servidor

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["main"]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: self-hosted
    env:
      HEALTHCHECK_URL: http://127.0.0.1:8000/health

    steps:
      - name: Atualizar codigo no servidor
        run: |
          sudo -n -u sistema-impress rm -f /opt/sistema-impress/.git/index.lock || true
          sudo -n -u sistema-impress git -C /opt/sistema-impress config --global --add safe.directory /opt/sistema-impress
          sudo -n -u sistema-impress git -C /opt/sistema-impress fetch --all --prune
          sudo -n -u sistema-impress git -C /opt/sistema-impress reset --hard origin/main
          sudo -n -u sistema-impress git -C /opt/sistema-impress clean -fd

      - name: Aplicar migrations
        run: |
          sudo -n -u sistema-impress bash -lc '
            cd /opt/sistema-impress
            set -a
            [ -f .env ] && . ./.env
            set +a
            .venv/bin/python -m db.schema_migrations upgrade
          '

      - name: Atualizar versao dos assets
        env:
          RELEASE_ASSET_VERSION: ${{ github.event.workflow_run.head_sha }}
        run: |
          sudo -n -u sistema-impress env RELEASE_ASSET_VERSION="$RELEASE_ASSET_VERSION" bash -lc '
            cd /opt/sistema-impress
            touch .env
            asset_version="${RELEASE_ASSET_VERSION:-manual-deploy}"
            asset_version="${asset_version:0:12}"

            if grep -q "^STATIC_ASSET_VERSION=" .env; then
              sed -i "s/^STATIC_ASSET_VERSION=.*/STATIC_ASSET_VERSION=${asset_version}/" .env
            else
              printf "\nSTATIC_ASSET_VERSION=%s\n" "$asset_version" >> .env
            fi
          '

      - name: Reiniciar servicos
        run: |
          sudo -n systemctl restart sistema-impress-api.service
          sudo -n systemctl restart sistema-impress-worker.service

      - name: Verificar servicos ativos
        run: |
          systemctl is-active --quiet sistema-impress-api.service
          systemctl is-active --quiet sistema-impress-worker.service

      - name: Healthcheck da API
        run: |
          for tentativa in $(seq 1 10); do
            resposta="$(curl --silent --show-error --fail "$HEALTHCHECK_URL" || true)"
            if printf '%s' "$resposta" | grep -Eq '"status"[[:space:]]*:[[:space:]]*"ok"'; then
              echo "$resposta"
              exit 0
            fi
            sleep 3
          done
          echo "Healthcheck falhou em $HEALTHCHECK_URL"
          exit 1
