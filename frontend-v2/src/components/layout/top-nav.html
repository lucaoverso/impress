<!--
  Top navbar v2

  Backend-ready areas:
  - Search form submits through data-top-navbar-search.
  - Notification and calendar buttons expose data attributes for future handlers.
  - Profile can render either an image or initials.
-->

<header class="top-navbar">
    <form class="top-navbar__search" role="search" data-top-navbar-search>
        <label class="top-navbar__search-field">
            <span class="ui-icon" aria-hidden="true">search</span>
            <span class="sr-only">Pesquisar</span>
            <input
                class="top-navbar__search-input"
                type="search"
                name="q"
                autocomplete="off"
                placeholder="Buscar estudante ou registro..."
                data-top-navbar-search-input
            >
        </label>
    </form>

    <div class="top-navbar__actions">
        <button class="top-navbar__icon-button" type="button" aria-label="Abrir notificacoes" data-top-navbar-notifications>
            <span class="ui-icon" aria-hidden="true">notifications</span>
            <span class="top-navbar__indicator" aria-hidden="true"></span>
        </button>

        <button class="top-navbar__icon-button" type="button" aria-label="Abrir calendario" data-top-navbar-calendar>
            <span class="ui-icon" aria-hidden="true">calendar_today</span>
        </button>

        <span class="top-navbar__divider" aria-hidden="true"></span>

        <button class="top-navbar__profile" type="button" aria-label="Abrir perfil do usuario" data-top-navbar-profile>
            <span class="top-navbar__profile-copy">
                <strong class="top-navbar__profile-name">Coord. Ana Paula</strong>
                <span class="top-navbar__profile-role">School Admin</span>
            </span>
            <span class="top-navbar__avatar" aria-hidden="true">AP</span>
        </button>
    </div>
</header>
