<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Suíte Escolar</title>
    {% include "includes/style_bundle.html" %}
</head>

<body>
    <main class="auth-page">
        <section class="auth-card">
            <header class="auth-header">
                <p class="auth-badge">Portal Escolar</p>
                <h1>Suíte Escolar</h1>
                <p>Acesse sua conta para continuar.</p>
            </header>

            <form class="form" onsubmit="event.preventDefault(); login();">
                <h2>Entrar</h2>
                <input id="email" type="email" autocomplete="email" placeholder="Email" required>
                <input id="senha" type="password" autocomplete="current-password" placeholder="Senha" required>
                <button type="submit" class="btn-destaque">Entrar</button>
                <button id="btnMostrarRecuperacao" type="button" class="register-secondary-btn"
                    aria-haspopup="dialog" aria-controls="modalRecuperacaoSenha" aria-expanded="false">
                    Esqueci minha senha
                </button>
                <button id="btnCadastroProfessor" type="button" class="register-secondary-btn">Criar conta de professor</button>
                <p id="erro" role="alert" aria-live="polite"></p>
            </form>
        </section>
    </main>

    <section id="modalRecuperacaoSenha" class="auth-modal" hidden>
        <article id="painelRecuperacaoSenha" class="auth-modal-card" role="dialog" aria-modal="true"
            aria-labelledby="tituloRecuperacaoSenha" tabindex="-1">
            <header class="auth-modal-header">
                <div>
                    <p class="auth-badge">Professores</p>
                    <h2 id="tituloRecuperacaoSenha">Redefinir senha</h2>
                    <p>Confirme seus dados para criar uma nova senha com seguranca.</p>
                </div>
                <button id="btnFecharRecuperacao" type="button" class="register-secondary-btn auth-modal-close">
                    Fechar
                </button>
            </header>

            <form id="formRecuperacaoSenha" class="auth-recovery" novalidate>
                <input id="recEmail" type="email" autocomplete="email" placeholder="Email do professor" required>
                <input id="recDataNascimento" type="date" placeholder="Data de nascimento" required>
                <input id="recNovaSenha" type="password" autocomplete="new-password" placeholder="Nova senha" required>
                <input id="recConfirmacaoSenha" type="password" autocomplete="new-password"
                    placeholder="Confirmar nova senha" required>

                <div class="auth-modal-actions">
                    <button id="btnCancelarRecuperacao" type="button" class="register-secondary-btn">Cancelar</button>
                    <button id="btnRecuperarSenha" type="submit" class="btn-destaque">Redefinir senha</button>
                </div>

                <p id="msgRecuperacao" role="alert" aria-live="polite"></p>
            </form>
        </article>
    </section>

    <footer>
        <p>Desenvolvido por Lucas Sbaraini</p>
        <p>2026</p>
    </footer>

    <script src="{{ request.url_for('static', path='js/core/dom.js') }}?v={{ asset_version | default('1') }}"></script>
    <script src="{{ request.url_for('static', path='js/core/auth.js') }}?v={{ asset_version | default('1') }}"></script>
    <script src="{{ request.url_for('static', path='js/core/api.js') }}?v={{ asset_version | default('1') }}"></script>
    <script src="{{ request.url_for('static', path='js/core/formatters.js') }}?v={{ asset_version | default('1') }}"></script>
    <script src="{{ request.url_for('static', path='js/app.js') }}?v={{ asset_version | default('1') }}"></script>
</body>

</html>
