{% set css_version = asset_version | default('1') %}
<link rel="stylesheet" href="{{ request.url_for('static', path='vendor/bootstrap-icons/bootstrap-icons.min.css') }}?v=1.13.1">
<link rel="stylesheet" href="{{ request.url_for('static', path='css/base.css') }}?v={{ css_version }}">
<link rel="stylesheet" href="{{ request.url_for('static', path='css/components.css') }}?v={{ css_version }}">
<link rel="stylesheet" href="{{ request.url_for('static', path='css/components/app-navbar.css') }}?v={{ css_version }}">
{% for page_style in page_styles | default([]) %}
<link rel="stylesheet" href="{{ request.url_for('static', path=page_style) }}?v={{ css_version }}">
{% endfor %}
<link rel="stylesheet" href="{{ request.url_for('static', path='css/design-system.css') }}?v={{ css_version }}">
<link rel="stylesheet" href="{{ request.url_for('static', path='css/components/continuous-surfaces.css') }}?v={{ css_version }}">
<link rel="stylesheet" href="{{ request.url_for('static', path='css/components/app-sidebar.css') }}?v={{ css_version }}">
<script defer src="{{ request.url_for('static', path='js/core/dialog_accessibility.js') }}?v={{ css_version }}"></script>
