<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento de Equipamentos</title>
    <link rel="stylesheet" href="{{ request.url_for('static', path='css/style.css') }}?v={{ asset_version | default('1') }}">
</head>

<body>
    <main class="scheduler-page">
        <section class="scheduler-toolbar">
            <h2>Agendamento de Equipamentos</h2>
            <p id="agendamentoUsuario"></p>

            <div class="scheduler-actions">
                <button id="btnVoltarServicos" type="button">Voltar aos serviços</button>
            </div>

            <hr>

            <h3>Novo agendamento</h3>
            <label for="recursoSelect">Recurso</label>
            <select id="recursoSelect"></select>

            <label for="dataReserva">Data</label>
            <input id="dataReserva" type="date">

            <label for="turmaReserva">Turma</label>
            <select id="turmaReserva"></select>

            <div id="grupoProfessorReserva" style="display: none;">
                <label for="professorReserva">Professor solicitante</label>
                <select id="professorReserva"></select>
            </div>

            <label for="aulaReserva">Aula (1ª a 5ª)</label>
            <select id="aulaReserva"></select>

            <label for="observacaoReserva">Observação</label>
            <textarea id="observacaoReserva" rows="3" placeholder="Se precisar que o PCPI deixe algum site abert nos computadores, use este campo para descrever."></textarea>

            <button id="btnAgendar" class="btn-destaque" type="button">Agendar recurso</button>
            <p id="msgAgendamento"></p>
        </section>

        <section class="scheduler-content">
            <article class="calendar-card">
                <header class="calendar-header">
                    <button id="btnMesAnterior" type="button">◀</button>
                    <h3 id="mesAtual"></h3>
                    <button id="btnMesProximo" type="button">▶</button>
                    <button id="btnMesHoje" type="button">Hoje</button>
                </header>
                <div id="calendarioGrid" class="calendar-grid"></div>
            </article>

            <article class="calendar-card">
                <header class="booking-card-header">
                    <h3 id="tituloDia">Reservas do dia</h3>
                    <div class="booking-sort-controls" data-sort-target="dia">
                        <button type="button" class="booking-sort-field" data-sort-target="dia" data-sort-field="aula">Aula</button>
                        <button type="button" class="booking-sort-field" data-sort-target="dia" data-sort-field="turno">Turno</button>
                        <button type="button" class="booking-sort-field" data-sort-target="dia" data-sort-field="recurso">Recurso</button>
                        <button type="button" class="booking-sort-order" data-sort-target="dia">1º → último</button>
                        <button type="button" class="booking-sort-group" data-sort-target="dia">Agrupar por recurso</button>
                    </div>
                </header>
                <ul id="listaReservasDia"></ul>
            </article>

            <article class="calendar-card">
                <header class="booking-card-header">
                    <h3>Meus agendamentos</h3>
                    <div class="booking-sort-controls" data-sort-target="minhas">
                        <button type="button" class="booking-sort-field" data-sort-target="minhas" data-sort-field="data">Data</button>
                        <button type="button" class="booking-sort-field" data-sort-target="minhas" data-sort-field="aula">Aula</button>
                        <button type="button" class="booking-sort-field" data-sort-target="minhas" data-sort-field="turno">Turno</button>
                        <button type="button" class="booking-sort-field" data-sort-target="minhas" data-sort-field="recurso">Recurso</button>
                        <button type="button" class="booking-sort-order" data-sort-target="minhas">1º → último</button>
                        <button type="button" class="booking-sort-group" data-sort-target="minhas">Agrupar por recurso</button>
                    </div>
                </header>
                <ul id="listaMinhasReservas"></ul>
            </article>
        </section>
    </main>

    <script src="{{ request.url_for('static', path='js/agendamento.js') }}?v={{ asset_version | default('1') }}"></script>
</body>

</html>
